name: ar_transcribe
description: Real-time AR speech transcription with Deepgram STT and Gemini translation
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Environment / API keys
  flutter_dotenv: ^5.2.1

  # Real-time cloud STT + translation (ar-games/ar-transcribe architecture)
  web_socket_channel: ^3.0.1
  google_generative_ai: ^0.4.6

  # Microphone PCM stream + AR camera
  record: ^5.1.2
  camera: ^0.11.0+2

  # State management
  flutter_bloc: ^8.1.6
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Generated DI annotations
  get_it_injector: ^0.7.1
  get_it: ^8.0.3

  # Local storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0

  # Routing
  go_router: ^14.2.7

  # UI / utilities
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  share_plus: ^12.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  get_it_injector_gen: ^0.5.6

dependency_overrides:
  record_linux: 1.3.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
